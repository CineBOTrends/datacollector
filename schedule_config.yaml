# Upcoming releases: advance bookings for films that HAVEN'T released yet.
# Tracks each new film's OPENING DAY (its release date), not arbitrary offsets:
# discovers release dates from District's movieInfo, then scrapes advance for
# exactly those days and drops every film not opening that day.
upcoming:
  window_days: 21      # how far ahead to look for films with bookings open
  # discovery hits ~15 District venues in the biggest cities (cheap, and only
  # District rows carry movieInfo/releaseDate); the real collect uses all 9 shards
  # Bookings for new films open/refresh in bursts; a few passes a day is plenty.
  times:
    - "10:00"
    - "16:00"
    - "21:30"

cleanup:
  time: "02:00"
  retain_days: 10

# Where the scheduler pushes the built data/ (drives cinebotrends.com).
publish:
  dashboard_repo: "https://github.com/CineBOTrends/dashboard.git"
  dashboard_dir: "../dashboard-publish"   # local clone, created automatically