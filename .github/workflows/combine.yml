# .github/workflows/combine.yml
# MANUAL ONLY - re-combine + re-publish using shard data already in the repo
# Also supports content-only publishes (reviews/news/box office).

name: Combine + publish (manual)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: combine
  cancel-in-progress: false

env:
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
  R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

jobs:
  combine:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore history from R2
        run: python ci_persist.py restore

      - name: Combine whatever exists (both modes)
        shell: bash
        run: |
          set +e

          TODAY=$(TZ=Asia/Kolkata date +%Y%m%d)
          TOMO=$(TZ=Asia/Kolkata date -d "+1 day" +%Y%m%d)

          FOUND=0

          for SPEC in "daily:$TODAY" "advance:$TOMO"; do

            MODE="${SPEC%%:*}"
            DATE="${SPEC##*:}"

            DIR="$MODE/data/$DATE"

            if [ -d "$DIR" ]; then
              COUNT=$(find "$DIR" -maxdepth 1 -name "detailed*.json" | wc -l)
            else
              COUNT=0
            fi

            echo "$MODE $DATE -> $COUNT shard file(s)"

            if [ "$COUNT" -gt 0 ]; then
              echo "Combining $MODE $DATE"
              python cli.py combine --mode "$MODE" --date "$DATE"
              FOUND=1
            fi

          done

          if [ "$FOUND" -eq 0 ]; then
            echo "No new shard data found."
            echo "Continuing with restored history from R2."
          fi

      - name: Save raw data to R2
        run: python ci_persist.py save both || true

      - name: Build data tree
        run: python build_data.py .

      - name: Sanity check
        run: |
          if [ ! -f data/manifest.json ]; then
            echo "::error::manifest.json missing"
            exit 1
          fi

          if [ ! -s data/manifest.json ]; then
            echo "::error::manifest.json empty"
            exit 1
          fi

          python - <<'PY'
          import json
          m=json.load(open("data/manifest.json"))
          total=sum(len(v.get("dates",[])) for v in m.get("modes",{}).values())
          print("dates:",total)
          if total==0:
              raise SystemExit("Manifest contains no data")
          PY

      - name: Publish data -> dashboard repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone --depth 1 https://x-access-token:${GH_PAT}@github.com/CineBOTrends/dashboard.git out

          rm -rf out/data
          cp -R data out/data

          cd out

          git config user.name "cbt-bot"
          git config user.email "cinebotrends@users.noreply.github.com"

          git add -A

          git commit -m "data(manual): $(date -u +%FT%TZ)" || echo "No changes"

          git push